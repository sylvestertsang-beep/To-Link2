services:
  - type: web
    name: neighbourhood-backend
    rootDir: neighbourHood-backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SUPABASE_ENDPOINT
        sync: false
      - key: SUPABASE_ACCESS_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false

  - type: web
    name: neighbourhood-frontend
    runtime: node
    rootDir: neighbourHood-frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: NUXT_PUBLIC_API_BASE_URL
        sync: false
